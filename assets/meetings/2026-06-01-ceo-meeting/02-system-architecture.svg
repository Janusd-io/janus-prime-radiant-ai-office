<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#0f1117">
  <title>System Architecture — CEO Meeting 1 June 2026</title>
  <desc>GitHub breach risk at top, KB Wiki centre, Obsidian on JA/MB laptops, NanoClaw on VPS, ADIA/GIC financial counterparties, Singapore context.</desc>
  <defs>
    <marker id="ab" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#10b981"/></marker>
    <marker id="ay" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/></marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="480" fill="#0f1117"/>
  <!-- Singapore border -->
  <rect x="8" y="8" width="784" height="464" rx="16" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="670" y="458" fill="#334155" font-size="13" font-weight="600" font-family="system-ui,sans-serif" letter-spacing="2">SINGAPORE</text>
  <!-- GitHub breach -->
  <rect x="310" y="18" width="180" height="52" rx="10" fill="#3b1a1a" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="38" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700" font-family="system-ui,sans-serif">⚠  GitHub (GH)</text>
  <text x="400" y="54" text-anchor="middle" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">Master copy · Data breach risk</text>
  <!-- KB Wiki circle -->
  <circle cx="400" cy="190" r="68" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="400" y="184" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700" font-family="system-ui,sans-serif">KB · WIKI</text>
  <text x="400" y="203" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">Knowledge Base</text>
  <!-- GH → KB -->
  <line x1="400" y1="70" x2="400" y2="122" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)" stroke-dasharray="5,3"/>
  <text x="410" y="100" fill="#ef4444" font-size="10" font-family="system-ui,sans-serif">sync (risk)</text>
  <!-- CTO box -->
  <rect x="30" y="90" width="100" height="36" rx="8" fill="#1e2433" stroke="#475569" stroke-width="1.5"/>
  <text x="80" y="113" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="system-ui,sans-serif">CTO</text>
  <line x1="130" y1="108" x2="332" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#ab)" stroke-dasharray="4,3"/>
  <!-- Obsidian / Laptop -->
  <rect x="288" y="290" width="224" height="65" rx="10" fill="#1e2433" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="316" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600" font-family="system-ui,sans-serif">OBSIDIAN — LAPTOP</text>
  <text x="400" y="336" text-anchor="middle" fill="#818cf8" font-size="11" font-family="system-ui,sans-serif">JA (Jehad)   ·   MB (Michael)</text>
  <line x1="400" y1="258" x2="400" y2="290" stroke="#6366f1" stroke-width="2" marker-end="url(#ab)"/>
  <text x="410" y="278" fill="#6366f1" font-size="10" font-family="system-ui,sans-serif">5-min sync</text>
  <!-- NanoClaw VPS -->
  <rect x="580" y="150" width="175" height="75" rx="10" fill="#1a3530" stroke="#10b981" stroke-width="2"/>
  <text x="667" y="176" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600" font-family="system-ui,sans-serif">VPS · NanoClaw</text>
  <text x="667" y="194" text-anchor="middle" fill="#34d399" font-size="10" font-family="system-ui,sans-serif">Hostinger → AWS</text>
  <text x="667" y="210" text-anchor="middle" fill="#34d399" font-size="10" font-family="system-ui,sans-serif">NC = cloud "3rd user"</text>
  <line x1="580" y1="187" x2="468" y2="190" stroke="#10b981" stroke-width="2" marker-end="url(#ag)"/>
  <!-- Fin data layer -->
  <rect x="20" y="165" width="225" height="100" rx="10" fill="#2d1f00" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="186" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600" font-family="system-ui,sans-serif">FIN DATA LAYER</text>
  <rect x="120" y="194" width="65" height="30" rx="6" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="152" y="214" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700" font-family="system-ui,sans-serif">TAX</text>
  <text x="42" y="212" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif">ADIA</text>
  <text x="42" y="230" fill="#fbbf24" font-size="11" font-family="system-ui,sans-serif">GIC</text>
  <text x="42" y="248" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Counterparties</text>
  <text x="197" y="252" fill="#f59e0b" font-size="10" font-family="system-ui,sans-serif">Tax Data</text>
  <line x1="245" y1="215" x2="332" y2="190" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ay)"/>
  <!-- NanoClaw → same GitHub -->
  <line x1="667" y1="225" x2="667" y2="310" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="667" y1="310" x2="514" y2="320" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="570" y="304" fill="#10b981" font-size="10" font-family="system-ui,sans-serif">same GitHub</text>
  <!-- Breach note -->
  <rect x="520" y="380" width="255" height="78" rx="8" fill="#1f1010" stroke="#ef4444" stroke-width="1"/>
  <text x="532" y="399" fill="#fca5a5" font-size="10" font-weight="600" font-family="system-ui,sans-serif">⚠  DATA BREACH CONCERN</text>
  <text x="532" y="415" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">KB = AIO knowledge only (no client data).</text>
  <text x="532" y="430" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">Client interactions stay in LLM API calls.</text>
  <text x="532" y="445" fill="#f87171" font-size="10" font-family="system-ui,sans-serif">Resolution confirmed by Bonaventure.</text>
</svg>
