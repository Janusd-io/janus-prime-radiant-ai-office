<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Data Bank — CEO Meeting 1 June 2026</title>
  <desc>Janus as a data bank: Model/LLM at top feeds the Data Bank, customers access and pay data-movement fees. Bonaventure's "SWIFT of data" vision.</desc>
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/></marker>
    <marker id="arr1g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#10b981"/></marker>
    <marker id="arr1o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/></marker>
  </defs>
  <rect width="760" height="360" fill="#0f1117"/>
  <!-- Model box -->
  <rect x="290" y="30" width="180" height="60" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="380" y="55" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600" font-family="system-ui,sans-serif">MODEL / LLM</text>
  <text x="380" y="72" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">(Claude / Gemini / Open-source)</text>
  <!-- Arrow: Model → Data Bank -->
  <line x1="380" y1="90" x2="380" y2="148" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="393" y="124" fill="#3b82f6" font-size="10" font-family="system-ui,sans-serif">processes &amp; stores</text>
  <!-- Data Bank -->
  <rect x="240" y="150" width="280" height="80" rx="12" fill="#14532d" stroke="#10b981" stroke-width="2.5"/>
  <text x="290" y="197" text-anchor="start" fill="#34d399" font-size="32" font-weight="700" font-family="system-ui,sans-serif">$</text>
  <text x="330" y="197" text-anchor="start" fill="#6ee7b7" font-size="22" font-weight="700" font-family="system-ui,sans-serif">DATA BANK</text>
  <text x="380" y="218" text-anchor="middle" fill="#34d399" font-size="11" font-family="system-ui,sans-serif">Janus as the institutional data ledger</text>
  <!-- Customers -->
  <rect x="290" y="278" width="180" height="56" rx="12" fill="#1e2433" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="305" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600" font-family="system-ui,sans-serif">CUSTOMERS</text>
  <text x="380" y="322" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">Keppel · ADIA · GIC · 3rd parties</text>
  <!-- Arrows -->
  <line x1="340" y1="278" x2="318" y2="232" stroke="#10b981" stroke-width="2" marker-end="url(#arr1g)"/>
  <text x="275" y="261" fill="#10b981" font-size="10" font-family="system-ui,sans-serif">access / query</text>
  <line x1="420" y1="278" x2="442" y2="232" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr1o)"/>
  <text x="446" y="261" fill="#f59e0b" font-size="10" font-family="system-ui,sans-serif">data fees $</text>
  <!-- Client data box -->
  <rect x="580" y="160" width="150" height="60" rx="10" fill="#1e2433" stroke="#475569" stroke-width="1.5"/>
  <text x="655" y="183" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" font-family="system-ui,sans-serif">CLIENT DATA</text>
  <text x="655" y="200" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">IoT · sensors · images</text>
  <text x="655" y="214" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">WhatsApp · field updates</text>
  <line x1="580" y1="190" x2="522" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arr1)"/>
</svg>
