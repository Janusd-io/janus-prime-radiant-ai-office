<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#0f1117">
  <title>Data Rating Ecosystem — CEO Meeting 1 June 2026</title>
  <desc>MRI analogy for data auditing: Digital Twin feeds Audit/Verified layer, Edge Computer processes IoT sensor data, ADIA is counterparty, Keppel/Capita are clients, Singapore AAA Data Rating matrix.</desc>
  <defs>
    <marker id="d4b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/></marker>
    <marker id="d4g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#10b981"/></marker>
    <marker id="d4y" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/></marker>
    <marker id="d4p" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#a78bfa"/></marker>
    <marker id="d4s" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="800" height="460" fill="#0f1117"/>
  <!-- MRI box -->
  <rect x="288" y="14" width="224" height="58" rx="12" fill="#1e2433" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="38" text-anchor="middle" fill="#a5b4fc" font-size="15" font-weight="700" font-family="system-ui,sans-serif">MRI</text>
  <text x="400" y="56" text-anchor="middle" fill="#818cf8" font-size="10" font-family="system-ui,sans-serif">Digital "scan" of a building — audit mechanism</text>
  <!-- MRI → DT arrow -->
  <line x1="348" y1="72" x2="248" y2="152" stroke="#6366f1" stroke-width="2" marker-end="url(#d4p)"/>
  <!-- Digital Twin -->
  <rect x="148" y="155" width="190" height="62" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="243" y="180" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700" font-family="system-ui,sans-serif">DIGITAL TWIN (DT)</text>
  <text x="243" y="200" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif">HGTFT / MEOS sensor model</text>
  <!-- Audit/Verified oval -->
  <ellipse cx="295" cy="308" rx="104" ry="48" fill="#0d2218" stroke="#10b981" stroke-width="2.5"/>
  <text x="295" y="302" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700" font-family="system-ui,sans-serif">AUDIT</text>
  <text x="295" y="320" text-anchor="middle" fill="#34d399" font-size="11" font-family="system-ui,sans-serif">VERIFIED</text>
  <line x1="243" y1="217" x2="268" y2="260" stroke="#10b981" stroke-width="2" marker-end="url(#d4g)"/>
  <!-- Edge Computer -->
  <rect x="390" y="278" width="185" height="60" rx="10" fill="#1f2835" stroke="#38bdf8" stroke-width="2"/>
  <text x="483" y="302" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600" font-family="system-ui,sans-serif">EDGE COMPUTER</text>
  <text x="483" y="320" text-anchor="middle" fill="#38bdf8" font-size="10" font-family="system-ui,sans-serif">On-site IoT gateway</text>
  <!-- Audit ↔ Edge arrows -->
  <line x1="399" y1="302" x2="390" y2="302" stroke="#10b981" stroke-width="2" marker-end="url(#d4g)"/>
  <line x1="390" y1="296" x2="399" y2="296" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- IoT sensors -->
  <rect x="580" y="198" width="185" height="72" rx="10" fill="#1e2433" stroke="#475569" stroke-width="1.5"/>
  <text x="672" y="222" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="system-ui,sans-serif">IoT SENSORS</text>
  <text x="672" y="240" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">Temp · Airflow · Electricity</text>
  <text x="672" y="256" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">MAC address · Location</text>
  <line x1="580" y1="234" x2="575" y2="302" stroke="#475569" stroke-width="1.5" marker-end="url(#d4b)"/>
  <!-- Keppel / Capita -->
  <rect x="590" y="335" width="185" height="66" rx="10" fill="#1e2433" stroke="#64748b" stroke-width="1.5"/>
  <text x="682" y="360" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700" font-family="system-ui,sans-serif">KEPPEL · CAPITA</text>
  <text x="682" y="378" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">Asset operators / clients</text>
  <text x="682" y="393" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">LGPD / regulatory compliance</text>
  <!-- ADIA counterparty -->
  <rect x="448" y="138" width="150" height="56" rx="10" fill="#2d1f00" stroke="#f59e0b" stroke-width="2"/>
  <text x="523" y="163" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700" font-family="system-ui,sans-serif">ADIA</text>
  <text x="523" y="181" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="system-ui,sans-serif">Sovereign wealth fund counterparty</text>
  <line x1="480" y1="194" x2="390" y2="290" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#d4y)"/>
  <!-- Singapore Data Rating -->
  <rect x="16" y="115" width="130" height="145" rx="10" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="81" y="135" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" font-family="system-ui,sans-serif">SINGAPORE</text>
  <rect x="24" y="143" width="114" height="104" rx="6" fill="#1e2433" stroke="#334155" stroke-width="1"/>
  <text x="81" y="163" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700" font-family="system-ui,sans-serif">AAA</text>
  <text x="81" y="178" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">Data Rating</text>
  <line x1="38" y1="183" x2="130" y2="183" stroke="#334155" stroke-width="0.8"/>
  <text x="35" y="198" fill="#64748b" font-size="9" font-family="system-ui,sans-serif">Provenance ✓</text>
  <text x="35" y="212" fill="#64748b" font-size="9" font-family="system-ui,sans-serif">Source verified ✓</text>
  <text x="35" y="226" fill="#64748b" font-size="9" font-family="system-ui,sans-serif">Auditable ✓</text>
  <text x="35" y="240" fill="#4ade80" font-size="9" font-family="system-ui,sans-serif">Rating: AAA</text>
  <line x1="146" y1="188" x2="148" y2="188" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#d4b)"/>
  <line x1="148" y1="188" x2="243" y2="188" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Bottom caption -->
  <rect x="16" y="376" width="355" height="68" rx="8" fill="#111827" stroke="#1e2d3d" stroke-width="1"/>
  <text x="28" y="396" fill="#64748b" font-size="10" font-weight="600" font-family="system-ui,sans-serif">KEY — "S&amp;P of Data"</text>
  <text x="28" y="412" fill="#475569" font-size="10" font-family="system-ui,sans-serif">Janus creates a data quality rating (AAA → C) backed by</text>
  <text x="28" y="427" fill="#475569" font-size="10" font-family="system-ui,sans-serif">verified sensor provenance. AAA-rated buildings attract</text>
  <text x="28" y="442" fill="#475569" font-size="10" font-family="system-ui,sans-serif">premium counterparties like ADIA and GIC.</text>
</svg>
